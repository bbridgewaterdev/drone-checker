<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DroneChecker — Coming Soon</title>
  <meta name="description" content="DroneChecker is coming soon. Register your interest to be notified at launch."/>
  <link rel="icon" type="image/png" href="/icons/icon-192.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <script>
    // TWA/installed app users always go straight to /app.html —
    // they should never see this coming soon page.
    // Web users who've previously accepted the disclaimer also redirect.
    // ?home=1 allows deliberate access to this page from the app footer.
    try {
      var params = new URLSearchParams(window.location.search);
      var bypass = params.has('home');
      var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      var hasAccepted = localStorage.getItem('dc_disclaimer') === 'accepted';
      if (!bypass && (isStandalone || hasAccepted)) {
        window.location.replace('/app.html' + window.location.search);
      }
    } catch(e) {}
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0f172a;--bg2:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--accent:#3b82f6;--border:rgba(255,255,255,0.08);}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
    .glow{position:fixed;top:30%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(ellipse,rgba(59,130,246,.12) 0%,transparent 70%);pointer-events:none;}
    .logo{margin-bottom:24px;}
    h1{font-size:28px;font-weight:700;margin-bottom:10px;letter-spacing:-.5px;}
    .sub{font-size:16px;color:var(--muted);margin-bottom:36px;line-height:1.6;}
    .form{display:flex;gap:8px;width:100%;max-width:360px;flex-wrap:wrap;justify-content:center;}
    .form input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
    .form input:focus{border-color:var(--accent);}
    .form input::placeholder{color:var(--muted);}
    .form button{background:var(--accent);border:none;border-radius:8px;padding:11px 20px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
    .form button:hover{opacity:.9;}
    .thanks{display:none;font-size:14px;color:#22c55e;margin-top:12px;}
    .footer{position:fixed;bottom:20px;font-size:12px;color:var(--muted);}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="logo">
    <svg width="64" height="64" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="20" fill="#0f172a"/>
      <circle cx="50" cy="50" r="32" fill="none" stroke="#38bdf8" stroke-width="3.5"/>
      <line x1="50" y1="50" x2="21" y2="21" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="79" y2="21" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="21" y2="79" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <line x1="50" y1="50" x2="79" y2="79" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <circle cx="21" cy="21" r="13" fill="none" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="79" cy="21" r="13" fill="none" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="21" cy="79" r="13" fill="none" stroke="#38bdf8" stroke-width="4"/>
      <circle cx="79" cy="79" r="13" fill="none" stroke="#38bdf8" stroke-width="4"/>
      <rect x="14" y="18" width="14" height="6" rx="2" fill="white" transform="rotate(-45 21 21)"/>
      <rect x="72" y="18" width="14" height="6" rx="2" fill="white" transform="rotate(45 79 21)"/>
      <rect x="14" y="76" width="14" height="6" rx="2" fill="white" transform="rotate(45 21 79)"/>
      <rect x="72" y="76" width="14" height="6" rx="2" fill="white" transform="rotate(-45 79 79)"/>
      <circle cx="50" cy="50" r="11" fill="white"/>
      <circle cx="50" cy="50" r="5.5" fill="#0f172a"/>
    </svg>
  </div>
  <h1>DroneChecker</h1>
  <p class="sub">Something for drone pilots is coming.<br/>Register your interest to be first to know.</p>
  <div class="form">
    <input type="email" id="email-input" placeholder="Your email address"/>
    <button onclick="register()">Notify me</button>
  </div>
  <div class="thanks" id="thanks">✓ Thanks — we'll be in touch!</div>
  <div class="footer">© 2026 DroneChecker</div>
<script>
function register(){
  var email=document.getElementById('email-input').value.trim();
  if(!email||!email.includes('@'))return;
  window.location.href='mailto:bbridgewater.dev@gmail.com?subject=DroneChecker%20Launch%20Notification&body=Please%20add%20me%20to%20the%20DroneChecker%20launch%20list%3A%20'+encodeURIComponent(email);
  document.getElementById('email-input').value='';
  document.getElementById('thanks').style.display='block';
}
document.getElementById('email-input').addEventListener('keydown',function(e){
  if(e.key==='Enter')register();
});
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});
  }
</script>
</body>
</html>
